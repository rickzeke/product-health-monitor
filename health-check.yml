name: Product Health Monitor
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check and update status
        run: |
          python3 << 'PYEOF'
          import urllib.request, datetime
          products = [
              ("miaozhuan-web", "秒转", "https://rickzeke.github.io/miaozhuan-web/"),
              ("social-game-web", "社交游戏", "https://rickzeke.github.io/social-game-web/"),
              ("ai-productivity-web", "AI提示词管理", "https://rickzeke.github.io/ai-productivity-web/"),
              ("ai-prompt-pro-web", "AI提示词优化", "https://rickzeke.github.io/ai-prompt-pro-web/"),
              ("ai-english-web", "AI英语助手", "https://rickzeke.github.io/ai-english-web/"),
              ("lyrics-sync-web", "歌词卡拉OK", "https://rickzeke.github.io/lyrics-sync-web/"),
              ("ai-life-simulator-web", "AI生活模拟器", "https://rickzeke.github.io/ai-life-simulator-web/"),
              ("multi-platform-publisher-web", "多平台发布", "https://rickzeke.github.io/multi-platform-publisher-web/"),
          ]
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          all_ok = True
          lines = []
          rows = []
          for key, name, url in products:
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  resp = urllib.request.urlopen(req, timeout=10)
                  code = resp.getcode()
                  if code == 200:
                      lines.append(f"- :white_check_mark: UP {name}")
                      rows.append(f"| {name} | [{url}]({url}) | :white_check_mark: |")
                  else:
                      lines.append(f"- :x: DOWN({code}) {name}")
                      rows.append(f"| {name} | [{url}]({url}) | :x: |")
                      all_ok = False
              except Exception as e:
                  lines.append(f"- :x: ERROR {name}")
                  rows.append(f"| {name} | [{url}]({url}) | :x: |")
                  all_ok = False
          
          emoji = ":white_check_mark:" if all_ok else ":x:"
          status = "All Products Healthy" if all_ok else "Products Down!"
          
          readme = f"# Product Health Monitor\n\n{emoji} **{status}** -- Last checked: {now}\n\n## Status\n"
          readme += "\n".join(lines) + "\n\n## Products\n| Product | URL | Status |\n|---------|-----|--------|\n"
          readme += "\n".join(rows) + "\n\n*Auto-checked hourly via GitHub Actions*\n"
          
          with open("README.md", "w") as f:
              f.write(readme)
          print(f"Updated: {status}")
          PYEOF
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update status $(date -u '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push origin main 2>&1 || echo "Push failed"
