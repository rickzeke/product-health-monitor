name: Product Health Monitor
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check product URLs
        run: |
          python3 << 'PYEOF'
          import urllib.request, json
          products = [
              ("miaozhuan-web", "秒转", "https://rickzeke.github.io/miaozhuan-web/"),
              ("social-game-web", "社交游戏", "https://rickzeke.github.io/social-game-web/"),
              ("ai-productivity-web", "AI提示词管理", "https://rickzeke.github.io/ai-productivity-web/"),
              ("ai-prompt-pro-web", "AI提示词优化", "https://rickzeke.github.io/ai-prompt-pro-web/"),
              ("ai-english-web", "AI英语助手", "https://rickzeke.github.io/ai-english-web/"),
              ("lyrics-sync-web", "歌词卡拉OK", "https://rickzeke.github.io/lyrics-sync-web/"),
              ("ai-life-simulator-web", "AI生活模拟器", "https://rickzeke.github.io/ai-life-simulator-web/"),
              ("multi-platform-publisher-web", "多平台发布", "https://rickzeke.github.io/multi-platform-publisher-web/"),
          ]
          all_ok = True
          lines = []
          rows = []
          for key, name, url in products:
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  resp = urllib.request.urlopen(req, timeout=10)
                  code = resp.getcode()
                  status = "UP" if code == 200 else f"DOWN({code})"
                  emoji = ":white_check_mark:" if code == 200 else ":x:"
                  if code != 200: all_ok = False
              except Exception as e:
                  status = f"ERROR"
                  emoji = ":x:"
                  all_ok = False
              lines.append(f"- {emoji} {status} {name}")
              rows.append(f"| {name} | [{url}]({url}) | {'✅' if all_ok and status == 'UP' else '❌'} |")
          
          with open("status.json", "w") as f:
              json.dump({"all_ok": all_ok, "lines": lines, "rows": rows}, f)
          PYEOF
      
      - name: Update status page
        run: |
          python3 << 'PYEOF'
          import json, datetime
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          d = json.load(open("status.json"))
          all_ok = d["all_ok"]
          emoji = "✅" if all_ok else "❌"
          status_text = "All Products Healthy" if all_ok else "Products Down!"
          
          lines = d["lines"]
          rows = d["rows"]
          
          readme = f"""# Product Health Monitor
          
          {emoji} **{status_text}** — Last checked: {now}
          
          ## Status
          """
          for l in lines:
              readme += l + "\n"
          
          readme += """
          
          ## Products
          | Product | URL | Status |
          |---------|-----|--------|
          """
          for r in rows:
              readme += r + "\n"
          
          readme += """
          
          *Auto-checked hourly via GitHub Actions*
          """
          
          with open("README.md", "w") as f:
              f.write(readme)
          print("README updated:", "healthy" if all_ok else "UNHEALTHY")
          PYEOF
      
      - name: Commit and push
        run: |
          git config user.name "Health Monitor"
          git config user.email "monitor@rickzeke.github"
          git add README.md
          git diff --quiet || git commit -m "Update status $(date -u '+%Y-%m-%d %H:%M')" && git push origin main 2>&1 || echo "No changes"
      
      - name: Alert on failure
        if: steps.check.outputs.all_ok != 'True'
        run: echo "::warning title=Product Down::Some products returned non-200 status"
