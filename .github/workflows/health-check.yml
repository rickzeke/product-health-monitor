name: Product Health Monitor
on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check product URLs
        id: check
        run: |
          PRODUCTS=(
            "miaozhuan-web|https://rickzeke.github.io/miaozhuan-web/"
            "social-game-web|https://rickzeke.github.io/social-game-web/"
            "ai-productivity-web|https://rickzeke.github.io/ai-productivity-web/"
            "ai-prompt-pro-web|https://rickzeke.github.io/ai-prompt-pro-web/"
            "ai-english-web|https://rickzeke.github.io/ai-english-web/"
            "lyrics-sync-web|https://rickzeke.github.io/lyrics-sync-web/"
            "ai-life-simulator-web|https://rickzeke.github.io/ai-life-simulator-web/"
            "multi-platform-publisher-web|https://rickzeke.github.io/multi-platform-publisher-web/"
          )
          
          ALL_OK=true
          REPORT="## Product Health Report\n\n"
          REPORT+="Checked at: $(date -u '+%Y-%m-%d %H:%M UTC')\n\n"
          
          for entry in "${PRODUCTS[@]}"; do
            IFS='|' read -r name url <<< "$entry"
            HTTP_CODE=$(curl -sI -o /dev/null -w "%{http_code}" "$url" --max-time 10)
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS="✅ UP"
              REPORT+="- $STATUS $name ($HTTP_CODE)\n"
            else
              STATUS="❌ DOWN"
              REPORT+="- $STATUS $name (HTTP $HTTP_CODE) — $url\n"
              ALL_OK=false
            fi
          done
          
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "ALL_OK=$ALL_OK" >> $GITHUB_OUTPUT
          echo "all_ok=$ALL_OK" >> $GITHUB_OUTPUT
      
      - name: Generate status badge
        run: |
          ALL_OK=${{ steps.check.outputs.all_ok }}
          if [ "$ALL_OK" = "true" ]; then
            echo "✅ All products healthy"
            echo "status=healthy" >> $GITHUB_ENV
          else
            echo "❌ Some products are down!"
            echo "status=unhealthy" >> $GITHUB_ENV
            echo "::warning title=Product Down::Some products returned non-200 status"
          fi
      
      - name: Create status page
        run: |
          REPORT="${{ steps.check.outputs.report }}"
          cat > README.md << PAGE
          # Product Health Monitor
          
          $REPORT
          
          ## Live Status
          ![Health](https://github.com/rickzeke/product-health-monitor/actions/workflows/health-check.yml/badge.svg)
          
          ## Products
          | Product | URL | Status |
          |---------|-----|--------|
          | 秒转 | https://rickzeke.github.io/miaozhuan-web/ | ✅ |
          | 社交游戏 | https://rickzeke.github.io/social-game-web/ | ✅ |
          | AI提示词管理 | https://rickzeke.github.io/ai-productivity-web/ | ✅ |
          | AI提示词优化 | https://rickzeke.github.io/ai-prompt-pro-web/ | ✅ |
          | AI英语助手 | https://rickzeke.github.io/ai-english-web/ | ✅ |
          | 歌词卡拉OK | https://rickzeke.github.io/lyrics-sync-web/ | ✅ |
          | AI生活模拟器 | https://rickzeke.github.io/ai-life-simulator-web/ | ✅ |
          | 多平台发布 | https://rickzeke.github.io/multi-platform-publisher-web/ | ✅ |
          
          *Auto-checked hourly via GitHub Actions*
          PAGE
      
      - name: Commit and push status
        run: |
          git config user.name "Health Monitor"
          git config user.email "monitor@rickzeke.github"
          git add README.md
          git diff --quiet || git commit -m "Update health status $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main 2>&1 || echo "No changes to push"
